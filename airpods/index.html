<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airpods MAX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__top">
                <a href="#" class="logo">
                    <img src="./images/logo.svg" alt="logo" class="logo__img">
                </a>
                <nav class="menu">
                    <ul class="menu__list">
                        <li class="menu__item"><a href="#" class="menu__link">Info</a></li>
                        <li class="menu__item"><a href="#" class="menu__link">Product</a></li>
                        <li class="menu__item"><a href="#" class="menu__link">Contacts</a></li>
                        <li class="menu__item"><button class="menu__btn">Buy</button></li>
                    </ul>
                </nav>
            </div>
            <div class="header__content">
                <h1 class="title">
                    <span class="title__air">Air</span><span class="title__pod">Pod</span><span
                        class="title__s">S</span><span class="title__m">M</span><span class="title__ax">AX</span>
                </h1>
                <div class="header__content-images">
                    <img src="./images/airpods-skyblue.png" alt="airpods" class="header__img">
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="choose-color">
            <div class="container">
                <h3 class="choose-color__title">Choose your color</h3>
                <p class="choose-color__text">
                    The perfect balance between the purity of hi-fi and the magic of AirPods.<br>
                    The ultimate personal audio experience.
                </p>
                <div class="choose-color__list">
                    <button class="choose-color__list-btn">
                        <img src="./images/black-mini.png" alt="img" class="choose-color__list-img">
                    </button>
                    <!-- <button class="choose-color__list-btn">
                        <img src="./images/blue-mini.png" alt="img" class="choose-color__list-img">
                    </button> -->
                    <button class="choose-color__list-btn">
                        <img src="./images/pink-mini.png" alt="img" class="choose-color__list-img">
                    </button class="choose-color__list-btn">
                    <button class="choose-color__list-btn">
                        <img src="./images/silver-mini.png" alt="img" class="choose-color__list-img">
                    </button>
                    <button class="choose-color__list-btn">
                        <img src="./images/green-mini.png" alt="img" class="choose-color__list-img">
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>

</html>
